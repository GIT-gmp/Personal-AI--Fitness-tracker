name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git openjdk-17-jdk python3-pip \
            libffi-dev libssl-dev libtool autoconf automake \
            libltdl-dev zlib1g-dev libncurses5-dev libgdbm-dev \
            libnss3-dev libreadline-dev libsqlite3-dev wget curl make cmake

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 virtualenv

      - name: Build with Buildozer
        run: |
          # The 'yes' command accepts the Android SDK licenses automatically
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitnessOptimizer-APK
          path: bin/*.apk
